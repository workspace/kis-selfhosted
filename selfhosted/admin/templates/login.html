<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — KIS Selfhosted</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { width: 380px; padding: 40px; background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
    h1 { font-size: 1.4em; margin-bottom: 24px; text-align: center; }
    .error { background: #fef2f2; color: #dc2626; padding: 10px 14px; border-radius: 6px; margin-bottom: 16px; font-size: .9em; }
    label { display: block; font-size: .9em; font-weight: 500; margin-bottom: 4px; color: #555; }
    input[type="text"], input[type="password"] {
      width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px;
      font-size: 1em; margin-bottom: 16px; outline: none; transition: border .2s;
    }
    input:focus { border-color: #2563eb; }
    button {
      width: 100%; padding: 12px; background: #2563eb; color: #fff; border: none;
      border-radius: 6px; font-size: 1em; font-weight: 500; cursor: pointer; transition: background .2s;
    }
    button:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <div class="card">
    <h1>KIS Selfhosted</h1>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    {% if mode == "oauth" %}
    <form method="post" action="/oauth/authorize">
      <input type="hidden" name="redirect_uri" value="{{ redirect_uri }}">
      <input type="hidden" name="code_challenge" value="{{ code_challenge }}">
      <input type="hidden" name="code_challenge_method" value="{{ code_challenge_method }}">
      <input type="hidden" name="state" value="{{ state }}">
      <label for="client_id">Client ID</label>
      <input type="text" id="client_id" name="client_id" value="{{ client_id }}" required autofocus>
      <label for="client_secret">Client Secret</label>
      <input type="password" id="client_secret" name="client_secret" required>
      <button type="submit">Authorize</button>
    </form>
    {% else %}
    <form method="post" action="/oauth/login">
      <input type="hidden" name="next" value="{{ next }}">
      <label for="client_id">Client ID</label>
      <input type="text" id="client_id" name="client_id" required autofocus>
      <label for="client_secret">Client Secret</label>
      <input type="password" id="client_secret" name="client_secret" required>
      <button type="submit">Login</button>
    </form>
    {% endif %}
  </div>
</body>
</html>
