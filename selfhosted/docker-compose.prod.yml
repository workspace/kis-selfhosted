# Production docker-compose for Portainer / remote server
# 소스코드 불필요 — GHCR에서 빌드된 이미지를 pull합니다.
#
# 사용법:
#   1. .env 파일 작성 (cp .env.example .env && vi .env)
#   2. docker compose -f docker-compose.prod.yml up -d
#
# GHCR private 이미지 사용 시 먼저 로그인:
#   echo $CR_PAT | docker login ghcr.io -u <github-username> --password-stdin

services:
  kis-config-init:
    image: python:3.13-slim
    command:
      - python3
      - -c
      - |
        import os, pathlib
        cfg_dir = os.environ.get("KIS_CONFIG_DIR", "/app/kis-config")
        pathlib.Path(cfg_dir).mkdir(parents=True, exist_ok=True)
        entries = [
            ("my_app", os.environ.get("KIS_APP_KEY", "")),
            ("my_sec", os.environ.get("KIS_APP_SECRET", "")),
            ("paper_app", os.environ.get("KIS_PAPER_APP_KEY", "")),
            ("paper_sec", os.environ.get("KIS_PAPER_APP_SECRET", "")),
            ("my_htsid", os.environ.get("KIS_HTS_ID", "")),
            ("my_acct_stock", os.environ.get("KIS_ACCT_STOCK", "")),
            ("my_acct_future", os.environ.get("KIS_ACCT_FUTURE", "")),
            ("my_paper_stock", os.environ.get("KIS_PAPER_STOCK", "")),
            ("my_paper_future", os.environ.get("KIS_PAPER_FUTURE", "")),
            ("my_prod", os.environ.get("KIS_PROD_TYPE", "01")),
            ("my_token", ""),
            ("my_agent", os.environ.get("KIS_USER_AGENT", "Mozilla/5.0")),
            ("prod", "https://openapi.koreainvestment.com:9443"),
            ("ops", "ws://ops.koreainvestment.com:21000"),
            ("vps", "https://openapivts.koreainvestment.com:29443"),
            ("vops", "ws://ops.koreainvestment.com:31000"),
        ]
        cfg_path = os.path.join(cfg_dir, "kis_devlp.yaml")
        with open(cfg_path, "w", encoding="UTF-8") as f:
            for key, val in entries:
                f.write(f'{key}: "{val}"\n')
        print(f"[init] kis_devlp.yaml -> {cfg_path}")
    volumes:
      - kis-config:/app/kis-config
    environment:
      - KIS_CONFIG_DIR=/app/kis-config
      - KIS_APP_KEY=${KIS_APP_KEY:-}
      - KIS_APP_SECRET=${KIS_APP_SECRET:-}
      - KIS_PAPER_APP_KEY=${KIS_PAPER_APP_KEY:-}
      - KIS_PAPER_APP_SECRET=${KIS_PAPER_APP_SECRET:-}
      - KIS_HTS_ID=${KIS_HTS_ID:-}
      - KIS_ACCT_STOCK=${KIS_ACCT_STOCK:-}
      - KIS_ACCT_FUTURE=${KIS_ACCT_FUTURE:-}
      - KIS_PAPER_STOCK=${KIS_PAPER_STOCK:-}
      - KIS_PAPER_FUTURE=${KIS_PAPER_FUTURE:-}
      - KIS_PROD_TYPE=${KIS_PROD_TYPE:-01}
      - KIS_USER_AGENT=${KIS_USER_AGENT:-Mozilla/5.0}
    networks:
      - kis-net

  admin-gateway:
    image: ghcr.io/workspace/kis-admin:latest
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    environment:
      - CLIENT_ID=${CLIENT_ID}
      - CLIENT_SECRET=${CLIENT_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - GITHUB_URL=${GITHUB_URL:-https://github.com/koreainvestment/open-trading-api}
    volumes:
      - kis-config:/app/kis-config
    depends_on:
      kis-config-init:
        condition: service_completed_successfully
      strategy-backend:
        condition: service_started
      strategy-frontend:
        condition: service_started
      backtest-backend:
        condition: service_started
      backtest-frontend:
        condition: service_started
      backtest-mcp:
        condition: service_started
      trading-mcp:
        condition: service_started
    networks:
      - kis-net
    restart: unless-stopped

  strategy-backend:
    image: ghcr.io/workspace/kis-strategy-backend:latest
    environment:
      - KIS_CONFIG_DIR=/app/kis-config
      - CORS_ORIGINS=*
    volumes:
      - kis-config:/app/kis-config
    depends_on:
      kis-config-init:
        condition: service_completed_successfully
    networks:
      - kis-net
    restart: unless-stopped

  strategy-frontend:
    image: ghcr.io/workspace/kis-strategy-frontend:latest
    networks:
      - kis-net
    restart: unless-stopped

  backtest-backend:
    image: ghcr.io/workspace/kis-backtest-backend:latest
    entrypoint: ["sh", "-c"]
    command:
      - |
        if ! command -v docker >/dev/null 2>&1; then
          echo "[init] Installing Docker CLI..."
          python3 -c "
        import urllib.request, tarfile, io, platform
        arch = platform.machine()
        url = f'https://download.docker.com/linux/static/stable/{arch}/docker-27.5.1.tgz'
        data = urllib.request.urlopen(url).read()
        tf = tarfile.open(fileobj=io.BytesIO(data))
        for m in tf.getmembers():
            if m.name == 'docker/docker':
                m.name = 'docker'
                tf.extract(m, '/usr/local/bin')
                break
        print('[init] Docker CLI installed.')
        "
        fi
        exec uv run uvicorn backend.main:app --host 0.0.0.0 --port 8002
    environment:
      - KIS_CONFIG_DIR=/app/kis-config
      - CORS_ORIGINS=*
      - LEAN_DOCKER_VOLUME_NAME=${COMPOSE_PROJECT_NAME:-selfhosted}_lean-workspace
    volumes:
      - kis-config:/app/kis-config
      - lean-workspace:/app/.lean-workspace
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      kis-config-init:
        condition: service_completed_successfully
    networks:
      - kis-net
    restart: unless-stopped

  backtest-frontend:
    image: ghcr.io/workspace/kis-backtest-frontend:latest
    networks:
      - kis-net
    restart: unless-stopped

  backtest-mcp:
    image: ghcr.io/workspace/kis-backtest-mcp:latest
    environment:
      - KIS_CONFIG_DIR=/app/kis-config
      - MCP_HOST=0.0.0.0
      - MCP_PORT=3846
    volumes:
      - kis-config:/app/kis-config
      - lean-workspace:/app/.lean-workspace
    depends_on:
      kis-config-init:
        condition: service_completed_successfully
    networks:
      - kis-net
    restart: unless-stopped

  trading-mcp:
    image: ghcr.io/workspace/kis-trading-mcp:latest
    environment:
      - MCP_TYPE=streamable-http
      - MCP_HOST=0.0.0.0
      - MCP_PORT=3100
      - KIS_CONFIG_DIR=/app/kis-config
    volumes:
      - kis-config:/app/kis-config
    depends_on:
      kis-config-init:
        condition: service_completed_successfully
    networks:
      - kis-net
    restart: unless-stopped

volumes:
  kis-config:
  lean-workspace:

networks:
  kis-net:
    driver: bridge
