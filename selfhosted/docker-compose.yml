version: "3.8"

services:
  kis-config-init:
    image: python:3.13-slim
    command: ["python3", "/scripts/init-kis-config.py"]
    volumes:
      - kis-config:/app/kis-config
      - ./scripts:/scripts:ro
    environment:
      - KIS_CONFIG_DIR=/app/kis-config
      - KIS_APP_KEY=${KIS_APP_KEY:-}
      - KIS_APP_SECRET=${KIS_APP_SECRET:-}
      - KIS_PAPER_APP_KEY=${KIS_PAPER_APP_KEY:-}
      - KIS_PAPER_APP_SECRET=${KIS_PAPER_APP_SECRET:-}
      - KIS_HTS_ID=${KIS_HTS_ID:-}
      - KIS_ACCT_STOCK=${KIS_ACCT_STOCK:-}
      - KIS_ACCT_FUTURE=${KIS_ACCT_FUTURE:-}
      - KIS_PAPER_STOCK=${KIS_PAPER_STOCK:-}
      - KIS_PAPER_FUTURE=${KIS_PAPER_FUTURE:-}
      - KIS_PROD_TYPE=${KIS_PROD_TYPE:-01}
      - KIS_USER_AGENT=${KIS_USER_AGENT:-Mozilla/5.0}
    networks:
      - kis-net

  admin-gateway:
    build:
      context: ..
      dockerfile: selfhosted/dockerfiles/Dockerfile.admin
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    environment:
      - CLIENT_ID=${CLIENT_ID}
      - CLIENT_SECRET=${CLIENT_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - GITHUB_URL=${GITHUB_URL:-https://github.com/koreainvestment/open-trading-api}
    volumes:
      - kis-config:/app/kis-config
    depends_on:
      kis-config-init:
        condition: service_completed_successfully
      strategy-backend:
        condition: service_started
      strategy-frontend:
        condition: service_started
      backtest-backend:
        condition: service_started
      backtest-frontend:
        condition: service_started
      backtest-mcp:
        condition: service_started
      trading-mcp:
        condition: service_started
    networks:
      - kis-net
    restart: unless-stopped

  strategy-backend:
    build:
      context: ..
      dockerfile: selfhosted/dockerfiles/Dockerfile.strategy-backend
    environment:
      - KIS_CONFIG_DIR=/app/kis-config
      - CORS_ORIGINS=*
    volumes:
      - kis-config:/app/kis-config
    depends_on:
      kis-config-init:
        condition: service_completed_successfully
    networks:
      - kis-net
    restart: unless-stopped

  strategy-frontend:
    build:
      context: ..
      dockerfile: selfhosted/dockerfiles/Dockerfile.strategy-frontend
    networks:
      - kis-net
    restart: unless-stopped

  lean-init:
    image: docker:cli
    entrypoint: ["sh", "-c"]
    command:
      - |
        cp /usr/local/bin/docker /docker-bin/docker
        docker pull quantconnect/lean:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - docker-bin:/docker-bin

  backtest-backend:
    build:
      context: ..
      dockerfile: selfhosted/dockerfiles/Dockerfile.backtest-backend
    environment:
      - KIS_CONFIG_DIR=/app/kis-config
      - CORS_ORIGINS=*
      - LEAN_DOCKER_VOLUME_NAME=${COMPOSE_PROJECT_NAME:-selfhosted}_lean-workspace
    volumes:
      - kis-config:/app/kis-config
      - lean-workspace:/app/.lean-workspace
      - /var/run/docker.sock:/var/run/docker.sock
      - docker-bin:/docker-bin:ro
    depends_on:
      kis-config-init:
        condition: service_completed_successfully
      lean-init:
        condition: service_completed_successfully
    networks:
      - kis-net
    restart: unless-stopped

  backtest-frontend:
    build:
      context: ..
      dockerfile: selfhosted/dockerfiles/Dockerfile.backtest-frontend
    networks:
      - kis-net
    restart: unless-stopped

  backtest-mcp:
    build:
      context: ..
      dockerfile: selfhosted/dockerfiles/Dockerfile.backtest-mcp
    environment:
      - KIS_CONFIG_DIR=/app/kis-config
      - MCP_HOST=0.0.0.0
      - MCP_PORT=3846
    volumes:
      - kis-config:/app/kis-config
      - lean-workspace:/app/.lean-workspace
    depends_on:
      kis-config-init:
        condition: service_completed_successfully
    networks:
      - kis-net
    restart: unless-stopped

  trading-mcp:
    build:
      context: "../MCP/Kis Trading MCP"
    environment:
      - MCP_TYPE=streamable-http
      - MCP_HOST=0.0.0.0
      - MCP_PORT=3100
      - KIS_CONFIG_DIR=/app/kis-config
    volumes:
      - kis-config:/app/kis-config
    depends_on:
      kis-config-init:
        condition: service_completed_successfully
    networks:
      - kis-net
    restart: unless-stopped

volumes:
  kis-config:
  lean-workspace:
  docker-bin:

networks:
  kis-net:
    driver: bridge
